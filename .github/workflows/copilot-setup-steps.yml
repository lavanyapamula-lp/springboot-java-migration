name: "Copilot Agent Environment Setup"

on:
  workflow_call:
  workflow_dispatch: # Allows manual verification of setup

jobs:
  # Copilot setup workflow entrypoint job id.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Environment
        run: |
          java -version
          mvn -version